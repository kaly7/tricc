<VirtualHost *:9448>
  ServerAdmin webmaster@localhost
  DocumentRoot /var/www/html/fitnessmgr/public

  <Directory /var/www/html/fitnessmgr/public>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
  </Directory>

  <Directory /var/www/html/fitnessmgr/storage>
    Require all granted
  </Directory>

  ErrorLog ${APACHE_LOG_DIR}/fitnessmgr_error.log
  CustomLog ${APACHE_LOG_DIR}/fitnessmgr_access.log combined
</VirtualHost>
