<VirtualHost *:9453>
    ServerName tricc.local
    DocumentRoot /var/www/html/tricc/api/public

    <Directory /var/www/html/tricc/api/public>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    Alias /tricc/uploads /var/www/html/tricc/uploads
    <Directory /var/www/html/tricc/uploads>
        AllowOverride None
        Require all granted
        Options -Indexes -ExecCGI
        php_flag engine off
    </Directory>

    ErrorLog  /var/log/apache2/tricc_error.log
    CustomLog /var/log/apache2/tricc_access.log combined
</VirtualHost>
