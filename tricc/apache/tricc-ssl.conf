<VirtualHost *:9456>
    ServerName 192.168.16.22

    DocumentRoot /var/www/html/tricc/api/public

    SSLEngine on
    SSLCertificateFile    /etc/apache2/ssl/assetmgr-ca/assetmgr.crt
    SSLCertificateKeyFile /etc/apache2/ssl/assetmgr-ca/assetmgr.key

    <Directory /var/www/html/tricc/api/public>
        AllowOverride All
        Require all granted
        Options -Indexes
        php_value upload_max_filesize 10M
        php_value post_max_size 12M
    </Directory>

    Alias /tricc/uploads /var/www/html/tricc/uploads
    <Directory /var/www/html/tricc/uploads>
        AllowOverride None
        Require all granted
        Options -Indexes -ExecCGI
        php_flag engine off
    </Directory>

    Alias /tricc/docs /var/www/html/tricc/docs
    <Directory /var/www/html/tricc/docs>
        AllowOverride None
        Require all granted
        Options -Indexes -ExecCGI
        php_flag engine off
    </Directory>

    Alias /admin /var/www/html/tricc/admin
    <Directory /var/www/html/tricc/admin>
        AllowOverride None
        Require all granted
        Options -Indexes
        DirectoryIndex index.php
    </Directory>

    # WSS reverse proxy → Ratchet WS szerver (127.0.0.1:9454)
    ProxyRequests Off
    ProxyPass        /ws  ws://127.0.0.1:9454
    ProxyPassReverse /ws  ws://127.0.0.1:9454

    ErrorLog  /var/log/apache2/tricc_ssl_error.log
    CustomLog /var/log/apache2/tricc_ssl_access.log combined
</VirtualHost>
