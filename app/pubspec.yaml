name: tricc
description: "BabL42 — meghívásos belső csevegő alkalmazás"
publish_to: 'none'
version: 1.2.0+72

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  shared_preferences: ^2.3.0
  image_picker: ^1.1.0
  file_picker: ^8.1.0
  cached_network_image: ^3.4.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0
  url_launcher: ^6.3.0
  intl: ^0.20.0
  mime: ^2.0.0
  flutter_markdown: ^0.7.0
  http_parser: ^4.0.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  package_info_plus: ^9.0.1
  flutter_webrtc: ^0.12.0
  flutter_ringtone_player: ^4.0.0
  wakelock_plus: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon.png"
  remove_alpha_channel_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
